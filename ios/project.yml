name: Kadr
options:
  bundleIdPrefix: ru.kadr
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: ru.kadr.app
    INFOPLIST_FILE: Kadr/Info.plist
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Kadr:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kadr
        excludes:
          - "Info.plist"
    info:
      path: Kadr/Info.plist
    settings:
      base:
        PRODUCT_NAME: Kadr
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
